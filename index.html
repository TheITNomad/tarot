<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT ACCESS | SYSTEM INITIALIZING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00d4ff;
            --void: #050a0f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            border: 1px solid var(--cyan);
            padding: 40px;
            background: rgba(5, 10, 15, 0.9);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        p {
            margin-top: 20px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .loader {
            margin: 30px auto 0;
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            animation: load 2s infinite ease-in-out;
        }

        @keyframes load {
            0% { left: 0; width: 10%; }
            50% { width: 40%; }
            100% { left: 90%; width: 10%; }
        }

        .status {
            font-size: 0.7rem;
            margin-top: 40px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PROJECT GENESIS</h1>
        <p>System Initializing...</p>
        
        <div class="loader"></div>

        <div class="status">
            ESTABLISHED CONNECTION: ROOTACCESS.GG<br>
            DEPLOYMENT PHASE: Q2 2026
        </div>
    </div>

</body>
</html>

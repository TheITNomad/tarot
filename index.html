<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH WEST TAROT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        :root {
            --deep-purple: #1a0a2e;
            --gold: #d4af37;
            --soft-white: #f4e4bc;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, var(--deep-purple) 0%, #000 100%);
            color: var(--soft-white);
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            animation: ethereal-glow 4s ease-in-out infinite;
        }

        p {
            margin-top: 15px;
            letter-spacing: 4px;
            font-size: 1rem;
            color: var(--soft-white);
            opacity: 0.6;
            text-transform: uppercase;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto;
            position: relative;
        }

        /* Small diamond in center of divider */
        .divider::after {
            content: '◆';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 0.8rem;
        }

        @keyframes ethereal-glow {
            0%, 100% { text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); opacity: 0.9; }
            50% { text-shadow: 0 0 30px rgba(212, 175, 55, 0.8); opacity: 1; }
        }

        /* Optional: Subtle border corners */
        .frame {
            position: fixed;
            width: 90%;
            height: 90%;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="frame"></div>

    <div class="container">
        <h1>NORTH WEST TAROT</h1>
        <div class="divider"></div>
        <p>Seek the Unseen</p>
    </div>

</body>
</html>
